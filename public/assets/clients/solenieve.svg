<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 100" fill="none">
  <!-- Snowflake body -->
  <g transform="translate(90,38)">
    <!-- Main spokes -->
    <line x1="0" y1="-22" x2="0" y2="22" stroke="#2E86C1" stroke-width="4" stroke-linecap="round"/>
    <line x1="-19" y1="-11" x2="19" y2="11" stroke="#2E86C1" stroke-width="4" stroke-linecap="round"/>
    <line x1="-19" y1="11" x2="19" y2="-11" stroke="#2E86C1" stroke-width="4" stroke-linecap="round"/>
    <!-- Branch tips -->
    <line x1="-6" y1="-18" x2="0" y2="-22" stroke="#2E86C1" stroke-width="3" stroke-linecap="round"/>
    <line x1="6" y1="-18" x2="0" y2="-22" stroke="#2E86C1" stroke-width="3" stroke-linecap="round"/>
    <line x1="-6" y1="18" x2="0" y2="22" stroke="#2E86C1" stroke-width="3" stroke-linecap="round"/>
    <line x1="6" y1="18" x2="0" y2="22" stroke="#2E86C1" stroke-width="3" stroke-linecap="round"/>
    <line x1="-16" y1="-4" x2="-19" y2="-11" stroke="#2E86C1" stroke-width="3" stroke-linecap="round"/>
    <line x1="-14" y1="-14" x2="-19" y2="-11" stroke="#2E86C1" stroke-width="3" stroke-linecap="round"/>
    <line x1="16" y1="4" x2="19" y2="11" stroke="#2E86C1" stroke-width="3" stroke-linecap="round"/>
    <line x1="14" y1="14" x2="19" y2="11" stroke="#2E86C1" stroke-width="3" stroke-linecap="round"/>
    <line x1="16" y1="-4" x2="19" y2="-11" stroke="#2E86C1" stroke-width="3" stroke-linecap="round"/>
    <line x1="14" y1="-14" x2="19" y2="-11" stroke="#2E86C1" stroke-width="3" stroke-linecap="round"/>
    <line x1="-16" y1="4" x2="-19" y2="11" stroke="#2E86C1" stroke-width="3" stroke-linecap="round"/>
    <line x1="-14" y1="14" x2="-19" y2="11" stroke="#2E86C1" stroke-width="3" stroke-linecap="round"/>
  </g>
  <!-- Sun character on top -->
  <g transform="translate(90,18)">
    <circle cx="0" cy="0" r="7" fill="#F4D03F"/>
    <!-- Sun rays -->
    <line x1="0" y1="-11" x2="0" y2="-14" stroke="#F4D03F" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="8" y1="-8" x2="10" y2="-10" stroke="#F4D03F" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="11" y1="0" x2="14" y2="0" stroke="#F4D03F" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="-8" y1="-8" x2="-10" y2="-10" stroke="#F4D03F" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="-11" y1="0" x2="-14" y2="0" stroke="#F4D03F" stroke-width="2.5" stroke-linecap="round"/>
    <!-- Eyes -->
    <circle cx="-2.5" cy="-1" r="1.2" fill="#333"/>
    <circle cx="2.5" cy="-1" r="1.2" fill="#333"/>
  </g>
  <!-- Text -->
  <text x="90" y="80" text-anchor="middle" font-family="'Arial Black','Impact',sans-serif" font-weight="900" font-size="18" fill="#2E86C1" letter-spacing="2">SOLENIEVE</text>
</svg>
